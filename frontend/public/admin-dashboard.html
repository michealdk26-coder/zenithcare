<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ZenithCare Hospital</title>
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
    <div class="admin-layout">

        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🏥 ZenithCare</h2>
                <p>Admin Panel</p>
            </div>

            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="sidebar-link active">📊 Dashboard</a>
                <a href="admin-appointments.html" class="sidebar-link">📅 Appointments</a>
                <a href="admin-doctors.html" class="sidebar-link">👨‍⚕️ Doctors</a>
                <a href="admin-departments.html" class="sidebar-link">🏢 Departments</a>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
            </div>
        </aside>


        <main class="main-content">
            <div class="page-header">
                <h1>Dashboard Overview</h1>
                <p>Welcome to ZenithCare Hospital Admin Panel</p>
            </div>

            <div id="loadingSection" class="loading">
                <div class="spinner"></div>
                <p>Loading dashboard...</p>
            </div>

            <div id="dashboardContent" style="display: none;">

                <div class="stats-grid" id="statsGrid"></div>


                <div class="section-card">
                    <h2>Recent Appointments</h2>
                    <div class="table-container">
                        <table id="recentAppointments">
                            <thead>
                                <tr>
                                    <th>Patient</th>
                                    <th>Department</th>
                                    <th>Doctor</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script>
        const token = localStorage.getItem('zenithcare_token');
        if (!token) {
            window.location.href = 'admin-login.html';
        }

        let dashboardRefreshTimer = null;

        function handleLogout() {
            localStorage.removeItem('zenithcare_token');
            localStorage.removeItem('zenithcare_admin');
            window.location.href = 'admin-login.html';
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getDepartmentName(appointment) {
            if (appointment?.department?.name) {
                return appointment.department.name;
            }

            if (appointment?.doctor?.specialization) {
                return appointment.doctor.specialization.replace(/\s+Specialist$/i, '');
            }

            return 'N/A';
        }

        async function fetchDashboardData({ silent = false } = {}) {
            try {
                const [appointmentsRes, doctorsRes, departmentsRes] = await Promise.all([
                    fetch(API_CONFIG.getApiUrl('/api/admin/appointments'), {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch(API_CONFIG.getApiUrl('/api/doctors')),
                    fetch(API_CONFIG.getApiUrl('/api/departments'))
                ]);

                const appointmentsData = await appointmentsRes.json();
                const doctorsData = await doctorsRes.json();
                const departmentsData = await departmentsRes.json();

                if (appointmentsData.success) {
                    const appointments = appointmentsData.data;
                    const stats = {
                        total: appointments.length,
                        pending: appointments.filter(a => a.status === 'Pending').length,
                        approved: appointments.filter(a => a.status === 'Approved').length,
                        rejected: appointments.filter(a => a.status === 'Rejected').length,
                        doctors: doctorsData.success ? doctorsData.data.length : 0,
                        departments: departmentsData.success ? departmentsData.data.length : 0
                    };

                    displayStats(stats);
                    displayRecentAppointments(appointments.slice(0, 5));
                }

                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
                if (!silent) {
                    alert('Failed to load dashboard data');
                }
            }
        }

        function startDashboardAutoRefresh() {
            if (dashboardRefreshTimer) {
                clearInterval(dashboardRefreshTimer);
            }

            dashboardRefreshTimer = setInterval(() => {
                fetchDashboardData({ silent: true });
            }, 3000);
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                fetchDashboardData({ silent: true });
            }
        });

        function displayStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-content">
                        <h3>${stats.total}</h3>
                        <p>Total Appointments</p>
                    </div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-content">
                        <h3>${stats.pending}</h3>
                        <p>Pending Approvals</p>
                    </div>
                </div>
                <div class="stat-card approved">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <h3>${stats.approved}</h3>
                        <p>Approved</p>
                    </div>
                </div>
                <div class="stat-card rejected">
                    <div class="stat-icon">❌</div>
                    <div class="stat-content">
                        <h3>${stats.rejected}</h3>
                        <p>Rejected</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👨‍⚕️</div>
                    <div class="stat-content">
                        <h3>${stats.doctors}</h3>
                        <p>Total Doctors</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏢</div>
                    <div class="stat-content">
                        <h3>${stats.departments}</h3>
                        <p>Departments</p>
                    </div>
                </div>
            `;
        }

        function displayRecentAppointments(appointments) {
            const tbody = document.querySelector('#recentAppointments tbody');
            tbody.innerHTML = '';

            if (appointments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No appointments yet</td></tr>';
                return;
            }

            appointments.forEach(appointment => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${appointment.patient_name}</td>
                    <td>${getDepartmentName(appointment)}</td>
                    <td>${appointment.doctor?.full_name || 'Not assigned'}</td>
                    <td>${formatDate(appointment.appointment_date)}</td>
                    <td><span class="status-badge ${appointment.status.toLowerCase()}">${appointment.status}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        fetchDashboardData();
        startDashboardAutoRefresh();
    </script>
</body>
</html>
