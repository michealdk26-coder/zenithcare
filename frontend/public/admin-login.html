<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ZenithCare Hospital</title>
    <link rel="stylesheet" href="admin-login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🏥 ZenithCare Hospital</h1>
                <h2>Admin Login</h2>
                <p>Access the administrative dashboard</p>
            </div>

            <div id="errorAlert" class="alert alert-error" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="michealdk26@gmail.com"
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Login</button>
            </form>

            <div class="login-footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const errorAlert = document.getElementById('errorAlert');
            const loginBtn = document.getElementById('loginBtn');

            errorAlert.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(API_CONFIG.getApiUrl('/api/auth/login'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('zenithcare_token', data.data.token);
                    localStorage.setItem('zenithcare_admin', JSON.stringify(data.data.admin));

                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorAlert.textContent = '⚠️ ' + data.message;
                    errorAlert.style.display = 'block';
                }
            } catch (error) {
                errorAlert.textContent = '⚠️ Unable to connect to the server';
                errorAlert.style.display = 'block';
                console.error('Login error:', error);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
