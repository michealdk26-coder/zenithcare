<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - ZenithCare Hospital</title>
    <link rel="stylesheet" href="appointment.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🏥 ZenithCare Hospital</a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="doctors.html" class="nav-link">Doctors</a></li>
                <li><a href="appointment.html" class="nav-link">Book Appointment</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>


    <section class="page-header">
        <h1>Book an Appointment</h1>
        <p>Schedule your visit with our expert medical team</p>
    </section>


    <div class="container">
        <div class="form-card">
            <div id="successAlert" class="alert alert-success is-hidden"></div>
            <div id="errorAlert" class="alert alert-error is-hidden"></div>

            <form id="appointmentForm">
                <div class="form-group">
                    <label for="patient_name">Full Name <span class="required">*</span></label>
                    <input type="text" id="patient_name" name="patient_name" required placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" required placeholder="+234 800 123 4567">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="michealdk26@gmail.com">
                </div>

                <div class="form-group">
                    <label for="department_id">Department <span class="required">*</span></label>
                    <select id="department_id" name="department_id" required>
                        <option value="">Select a department</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="doctor_id">Preferred Doctor (Optional)</label>
                    <select id="doctor_id" name="doctor_id">
                        <option value="">Any available doctor</option>
                    </select>
                    <small class="form-hint" id="doctorHint">Select a department first</small>
                </div>

                <div class="form-group">
                    <label for="appointment_date">Appointment Date <span class="required">*</span></label>
                    <input type="date" id="appointment_date" name="appointment_date" required>
                    <small class="form-hint">Select a date for your appointment</small>
                </div>

                <div class="form-group">
                    <label for="appointment_time">Appointment Time <span class="required">*</span></label>
                    <select id="appointment_time" name="appointment_time" required>
                        <option value="">Select time</option>
                        <option value="09:00">09:00 AM</option>
                        <option value="09:30">09:30 AM</option>
                        <option value="10:00">10:00 AM</option>
                        <option value="10:30">10:30 AM</option>
                        <option value="11:00">11:00 AM</option>
                        <option value="11:30">11:30 AM</option>
                        <option value="12:00">12:00 PM</option>
                        <option value="14:00">02:00 PM</option>
                        <option value="14:30">02:30 PM</option>
                        <option value="15:00">03:00 PM</option>
                        <option value="15:30">03:30 PM</option>
                        <option value="16:00">04:00 PM</option>
                        <option value="16:30">04:30 PM</option>
                        <option value="17:00">05:00 PM</option>
                    </select>
                    <small class="form-hint">Hospital hours: 9:00 AM - 5:00 PM</small>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Book Appointment</button>
            </form>
        </div>
    </div>


    <footer class="footer">
        <p>&copy; 2026 ZenithCare Hospital. All rights reserved.</p>
    </footer>

    <script src="config.js"></script>
    <script src="fallback-data.js"></script>
    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        const appointmentDateInput = document.getElementById('appointment_date');
        const today = new Date();
        const minDate = today.toISOString().split('T')[0];
        appointmentDateInput.min = minDate;

        let departments = [];
        let doctors = [];

        function getUrlParameter(param) {
            const params = new URLSearchParams(window.location.search);
            return params.get(param);
        }

        const urlDoctorId = getUrlParameter('doctor_id');
        const urlDepartmentId = getUrlParameter('department_id');
        let hasAppliedUrlSelection = false;

        console.log('URL Parameters - Doctor ID:', urlDoctorId, 'Department ID:', urlDepartmentId);

        async function fetchData() {
            try {
                const [deptResponse, doctorResponse] = await Promise.all([
                    fetch(API_CONFIG.getApiUrl('/api/departments')),
                    fetch(API_CONFIG.getApiUrl('/api/doctors'))
                ]);

                const deptData = await deptResponse.json();
                const doctorData = await doctorResponse.json();

                if (deptData.success) {
                    departments = deptData.data;
                    populateDepartments();
                }

                if (doctorData.success) {
                    doctors = doctorData.data;
                }

                applyUrlDoctorSelection();

            } catch (error) {
                console.error('Error fetching data:', error);
                departments = window.PUBLIC_FALLBACK_DEPARTMENTS || [];
                doctors = window.PUBLIC_FALLBACK_DOCTORS || [];

                populateDepartments();
                applyUrlDoctorSelection();
            }
        }

        function populateDepartments() {
            const departmentSelect = document.getElementById('department_id');
            departmentSelect.innerHTML = '<option value="">Select a department</option>';

            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = String(dept.id);  // Ensure value is a string
                option.textContent = dept.name;
                departmentSelect.appendChild(option);
            });
            console.log('Departments populated:', departments.length);
        }

        function populateDoctorsByDepartment(departmentId, selectedDoctorId = null) {
            const normalizedDepartmentId = Number(departmentId);
            const doctorSelect = document.getElementById('doctor_id');
            const doctorHint = document.getElementById('doctorHint');

            doctorSelect.innerHTML = '<option value="">Any available doctor</option>';

            if (!normalizedDepartmentId) {
                doctorHint.textContent = 'Select a department first';
                doctorSelect.value = '';
                return;
            }

            const filteredDoctors = doctors.filter(doc =>
                Number(doc.department_id) === normalizedDepartmentId && doc.is_active
            );

            filteredDoctors.forEach(doctor => {
                const option = document.createElement('option');
                option.value = String(doctor.id);
                option.textContent = `${doctor.full_name} - ${doctor.specialization}`;
                doctorSelect.appendChild(option);
            });

            if (selectedDoctorId) {
                doctorSelect.value = String(selectedDoctorId);
            }

            doctorHint.textContent = filteredDoctors.length > 0
                ? 'Choose a preferred doctor or keep "Any available doctor"'
                : 'No active doctors in this department right now';
        }

        function applyUrlDoctorSelection() {
            if (hasAppliedUrlSelection || !urlDoctorId || departments.length === 0 || doctors.length === 0) {
                return;
            }

            const departmentSelect = document.getElementById('department_id');
            const doctorFromUrl = doctors.find((doc) => String(doc.id) === String(urlDoctorId));
            const inferredDepartmentId = doctorFromUrl ? String(doctorFromUrl.department_id) : '';
            const targetDepartmentId = urlDepartmentId ? String(urlDepartmentId) : inferredDepartmentId;

            if (targetDepartmentId) {
                departmentSelect.value = targetDepartmentId;
                populateDoctorsByDepartment(targetDepartmentId, urlDoctorId);
                console.log('Applied URL selection. Department:', targetDepartmentId, 'Doctor:', urlDoctorId);
            }

            hasAppliedUrlSelection = true;

            if (window.history && window.history.replaceState) {
                const cleanUrl = `${window.location.pathname}`;
                window.history.replaceState({}, document.title, cleanUrl);
            }
        }

        document.getElementById('department_id').addEventListener('change', function() {
            populateDoctorsByDepartment(this.value);
        });

        if (departments.length === 0) {
            departments = window.PUBLIC_FALLBACK_DEPARTMENTS || [];
            doctors = window.PUBLIC_FALLBACK_DOCTORS || [];
            populateDepartments();
        }

        const APPOINTMENT_ALERT_KEY = 'zenithcare_appointment_alert';
        const APPOINTMENT_ALERT_DURATION_MS = 3000;
        let alertHideTimer = null;

        function hideAlerts() {
            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');

            successAlert.classList.add('is-hidden');
            errorAlert.classList.add('is-hidden');
            sessionStorage.removeItem(APPOINTMENT_ALERT_KEY);
        }

        function scheduleAlertHide(delayMs = APPOINTMENT_ALERT_DURATION_MS) {
            if (alertHideTimer) {
                clearTimeout(alertHideTimer);
            }

            alertHideTimer = setTimeout(() => {
                hideAlerts();
            }, Math.max(0, delayMs));
        }

        function persistAlert(type, message) {
            sessionStorage.setItem(APPOINTMENT_ALERT_KEY, JSON.stringify({ type, message, time: Date.now() }));
        }

        function restorePersistedAlert() {
            const raw = sessionStorage.getItem(APPOINTMENT_ALERT_KEY);
            if (!raw) return;

            try {
                const alertData = JSON.parse(raw);
                const maxAgeMs = APPOINTMENT_ALERT_DURATION_MS;
                const ageMs = Date.now() - (alertData.time || 0);

                if (!alertData || !alertData.message || ageMs > maxAgeMs) {
                    sessionStorage.removeItem(APPOINTMENT_ALERT_KEY);
                    return;
                }

                const successAlert = document.getElementById('successAlert');
                const errorAlert = document.getElementById('errorAlert');

                successAlert.classList.add('is-hidden');
                errorAlert.classList.add('is-hidden');

                const target = alertData.type === 'error' ? errorAlert : successAlert;
                target.textContent = alertData.message;
                target.classList.remove('is-hidden');
                scheduleAlertHide(maxAgeMs - ageMs);
            } catch {
                sessionStorage.removeItem(APPOINTMENT_ALERT_KEY);
            }
        }

        restorePersistedAlert();

        document.getElementById('appointmentForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');
            const submitBtn = document.getElementById('submitBtn');

            const showAlert = (element, message) => {
                element.textContent = message;
                element.classList.remove('is-hidden');

                window.scrollTo({ top: 0, behavior: 'smooth' });

                const type = element.id === 'errorAlert' ? 'error' : 'success';
                persistAlert(type, message);
                scheduleAlertHide(APPOINTMENT_ALERT_DURATION_MS);
            };

            successAlert.classList.add('is-hidden');
            errorAlert.classList.add('is-hidden');
            sessionStorage.removeItem(APPOINTMENT_ALERT_KEY);

            const appointmentDate = document.getElementById('appointment_date').value;
            const appointmentTime = document.getElementById('appointment_time').value;

            if (!appointmentDate || !appointmentTime) {
                showAlert(errorAlert, '⚠️ Please select both date and time for the appointment');
                return;
            }

            const dateTimeString = `${appointmentDate}T${appointmentTime}:00`;
            const appointmentDateTime = new Date(dateTimeString);

            if (isNaN(appointmentDateTime.getTime())) {
                showAlert(errorAlert, '⚠️ Invalid date or time selected');
                return;
            }

            const formData = {
                patient_name: document.getElementById('patient_name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value || null,
                department_id: parseInt(document.getElementById('department_id').value),
                doctor_id: document.getElementById('doctor_id').value ? parseInt(document.getElementById('doctor_id').value) : null,
                appointment_date: appointmentDateTime.toISOString()
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Booking...';

            try {
                const response = await fetch(API_CONFIG.getApiUrl('/api/appointments'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                let data;
                try {
                    data = await response.json();
                } catch {
                    data = null;
                }

                if (response.ok && data && data.success) {
                    showAlert(successAlert, '✅ ' + data.message);
                    document.getElementById('appointmentForm').reset();

                    const departmentSelect = document.getElementById('department_id');
                    const doctorSelect = document.getElementById('doctor_id');
                    const doctorHint = document.getElementById('doctorHint');

                    departmentSelect.selectedIndex = 0;
                    doctorSelect.innerHTML = '<option value="">Any available doctor</option>';
                    doctorSelect.selectedIndex = 0;
                    doctorHint.textContent = 'Select a department first';

                    departmentSelect.dispatchEvent(new Event('change'));

                    appointmentDateInput.min = minDate;
                } else {
                    showAlert(errorAlert, '⚠️ ' + ((data && data.message) ? data.message : 'Unable to book appointment. Please try again later.'));
                }
            } catch (error) {
                showAlert(errorAlert, '⚠️ Unable to book appointment. Please try again later.');
                console.error('Error booking appointment:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Book Appointment';
            }
        });

        fetchData();
    </script>
</body>
</html>
